[custom]
; --- 基础设置 ---
enable_rule_generator=true
overwrite_original_rules=true

; --- 规则集设置 (优先使用 DustinWin 的 MRS/List) ---
; 基础过滤与拦截
ruleset=🎯 全球直连,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/private.mrs
ruleset=🎯 全球直连,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/applications.list
ruleset=🛑 全球拦截,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/ads.mrs

; 专项服务
ruleset=💬 AI 平台,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/ai.mrs
ruleset=🎥 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=Ⓜ️ 微软服务,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/microsoft-cn.mrs
ruleset=🍎 苹果服务,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/apple-cn.mrs
ruleset=🔍 谷歌服务,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/google-cn.mrs

; 流量分流
ruleset=🚀 节点切换,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/proxy.mrs
ruleset=🎯 全球直连,https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/cn.mrs
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; --- 策略组设置 ---
; 核心选择
custom_proxy_group=🚀 节点切换`select`[]⚡ 自动选择`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点`[]DIRECT
custom_proxy_group=⚡ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 业务分组
custom_proxy_group=💬 AI 平台`select`[]🚀 节点切换`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点
custom_proxy_group=🎥 Netflix`select`[]🚀 节点切换`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇺🇸 美国节点
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点切换
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT

; 地区自动选择 (正则过滤)
custom_proxy_group=🇭🇰 香港节点`url-test`(?i)(🇭🇰|港|hk|hongkong|hong kong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(?i)(🇯🇵|日|jp|japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(?i)(🇸🇬|新|sg|singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(?i)(🇺🇸|美|us|unitedstates|united states)`http://www.gstatic.com/generate_204`300,,50

; 最后的清理
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点切换`[]DIRECT